<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lixeira Inteligente · Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="8" fill="#161B22" stroke="#21262D"/>
      <rect x="10" y="14" width="16" height="14" rx="2" fill="none" stroke="#7FBA00" stroke-width="1.5"/>
      <path d="M8 14h20" stroke="#7FBA00" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M15 14v-3h6v3" stroke="#7FBA00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M18 17v7M15 21l3 3 3-3" stroke="#3D5A00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <div class="header-title">Lixeira Inteligente</div>
      <div class="header-sub" id="lixeira-id-display">lixeira/lixeira_01</div>
    </div>
  </div>
  <div id="conn-badge" class="conn-badge disconnected">
    <div class="conn-dot"></div>
    <span id="conn-label">Desconectado</span>
  </div>
</header>

<div id="alerta-banner">
  <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
    <path d="M8 1L1 13h14L8 1zm0 2.5L13.5 12h-11L8 3.5zM7.25 7v3h1.5V7h-1.5zm0 4v1.5h1.5V11h-1.5z"/>
  </svg>
  <span id="alerta-msg">—</span>
</div>

<main>

  <div class="card gauge-wrap">
    <div class="card-label">Ocupação Média</div>
    <div class="gauge-container">
      <svg class="gauge-svg" viewBox="0 0 200 120">
        <path id="gauge-track" class="gauge-track"
          d="M 30 105 A 70 70 0 0 1 170 105"
          stroke-dasharray="220 220"
          stroke-dashoffset="0"/>
        <path id="gauge-fill" class="gauge-fill"
          d="M 30 105 A 70 70 0 0 1 170 105"
          stroke="#7FBA00"
          stroke-dasharray="220 220"
          stroke-dashoffset="220"/>
      </svg>
      <div class="gauge-center">
        <div class="gauge-value" id="gauge-val">—</div>
        <div class="gauge-unit">por cento</div>
      </div>
    </div>
    <div class="gauge-caption" id="gauge-caption">aguardando dados...</div>
  </div>

  <div class="card niveis-card">
    <div class="card-label">Nível por Compartimento</div>

    <div class="nivel-row">
      <div class="nivel-header">
        <span class="nivel-name">DIR — Úmido</span>
        <span class="nivel-pct" id="nivel-dir-pct">—%</span>
      </div>
      <div class="nivel-track">
        <div class="nivel-bar" id="nivel-dir-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="nivel-row">
      <div class="nivel-header">
        <span class="nivel-name">ESQ — Seco</span>
        <span class="nivel-pct" id="nivel-esq-pct">—%</span>
      </div>
      <div class="nivel-track">
        <div class="nivel-bar" id="nivel-esq-bar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Triagens total</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--blue)" id="stat-umidos">—</div>
      <div class="stat-label">Úmidos</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--green)" id="stat-secos">—</div>
      <div class="stat-label">Secos</div>
    </div>
  </div>

  <div class="card sensor-card">
    <div class="sensor-item">
      <div class="sensor-val" id="sensor-umid">—<span class="sensor-unit">%</span></div>
      <div class="sensor-lbl">Umidade</div>
    </div>
    <div class="sensor-item">
      <div class="sensor-val" id="sensor-gatilho">—<span class="sensor-unit">cm</span></div>
      <div class="sensor-lbl">Gatilho</div>
    </div>
    <div class="sensor-item">
      <div class="sensor-val" id="sensor-servo">—<span class="sensor-unit">°</span></div>
      <div class="sensor-lbl">Servo</div>
    </div>
  </div>

  <div class="card feed-card">
    <div class="card-label">Eventos Recentes</div>
    <ul class="feed-list" id="feed-list">
      <li class="feed-item">
        <span class="feed-time">—</span>
        <span class="feed-badge badge-cmd">SISTEMA</span>
        <span class="feed-msg">Aguardando conexão com o broker...</span>
      </li>
    </ul>
  </div>

</main>

<footer class="controls">
  <span class="controls-label">Controles</span>
  <button class="btn btn-trava"  id="btn-travar"  onclick="enviarCmd('travar')"  disabled>⬛ Travar</button>
  <button class="btn btn-libera" id="btn-liberar" onclick="enviarCmd('liberar')" disabled>▶ Liberar</button>
  <button class="btn btn-reset"  id="btn-reset"   onclick="enviarCmd('reset')"   disabled>↺ Zerar Contadores</button>

  <div class="id-select-wrap">
    <span>ID:</span>
    <input class="id-input" id="id-input" value="lixeira_01" placeholder="lixeira_01">
    <button class="btn-reconectar" onclick="reconectar()">Conectar</button>
  </div>
</footer>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";


  const firebaseConfig = {
    apiKey: "AIzaSyCAskPPMRz-tkDqRIctCT_6CSEnTtmdXEg",
    authDomain: "lixoiot.firebaseapp.com",
    projectId: "lixoiot",
    storageBucket: "lixoiot.firebasestorage.app",
    messagingSenderId: "108109022081",
    appId: "1:108109022081:web:e3fbf108f895ded6a11e80",
    measurementId: "G-WSBFBJGXEM",
    databaseURL: "https://lixoiot-default-rtdb.firebaseio.com"
  };


  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  window.db = database;
  window.dbRef = ref;
  window.dbPush = push;
  window.dbSet = set;
</script>

<script src="script.js"></script>
</body>
</html>
